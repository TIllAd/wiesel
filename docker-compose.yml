version: '3.8'

services:
  wiesel-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app/backend
      - ./knowledge_base:/knowledge_base
      - ./system-prompt.md:/system-prompt.md
      - wiesel-db:/app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8001 --reload
    networks:
      - wiesel-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  wiesel-network:
    driver: bridge

volumes:
  wiesel-db:
  