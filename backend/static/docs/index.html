<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wiesel Docs</title>
<link rel="stylesheet" href="/docs-theme.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar" aria-label="Dokumentnavigation">
    <p class="brand">Wiesel Docs</p>

    <section class="section" aria-labelledby="public-docs">
      <h2 class="section-title" id="public-docs">Öffentlich</h2>
      <ul class="doc-list" id="public-doc-list"></ul>
    </section>

    <section class="section" aria-labelledby="internal-docs">
      <h2 class="section-title" id="internal-docs">Intern</h2>
      <ul class="doc-list" id="internal-doc-list"></ul>
    </section>
  </aside>

  <main class="content">
    <div class="empty-state" id="empty-state">
      <div class="empty-card">
        <h1>Wähle eine Doc-Seite aus der Liste</h1>
        <p>Öffentliche Dokumente werden hier im geschützten Bereich geladen.</p>
      </div>
    </div>
    <iframe class="is-hidden" id="doc-frame" title="Wiesel Dokument"></iframe>
  </main>
</div>

<script src="/docs-config.js?v=docs-20260701-arch6"></script>
<script>
(() => {
  if (window.top !== window.self) {
    window.top.location.href = window.location.href;
    return;
  }

  const docsConfig = window.WIESEL_DOCS || { publicDocs: [], internalDocs: [] };
  const publicDocs = Array.isArray(docsConfig.publicDocs) ? docsConfig.publicDocs : [];
  const internalDocs = Array.isArray(docsConfig.internalDocs) ? docsConfig.internalDocs : [];
  const frame = document.getElementById('doc-frame');
  const emptyState = document.getElementById('empty-state');
  const publicList = document.getElementById('public-doc-list');
  const internalList = document.getElementById('internal-doc-list');

  function escapeHtml(value) {
    return String(value || '').replace(/[&<>'"]/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      "'": '&#39;',
      '"': '&quot;',
    }[char]));
  }

  function normalizePath(value) {
    return String(value || '').replace(/^\/+/, '');
  }

  publicList.innerHTML = publicDocs.map((doc) => {
    const path = normalizePath(doc.path);
    return `<li><a class="doc-link" href="#${escapeHtml(path)}" data-doc="${escapeHtml(path)}">${escapeHtml(doc.title)}</a></li>`;
  }).join('');

  internalList.innerHTML = internalDocs.map((doc) => {
    const path = normalizePath(doc.path);
    return `<li><a class="doc-link" href="/internal/#${escapeHtml(path)}">${escapeHtml(doc.title)}</a></li>`;
  }).join('');

  const links = Array.from(document.querySelectorAll('[data-doc]'));
  const docs = new Set(links.map((link) => link.dataset.doc));

  function normalizeHash() {
    const raw = normalizePath(decodeURIComponent(location.hash.replace(/^#/, '')));
    return docs.has(raw) ? raw : '';
  }

  function setActive(doc) {
    links.forEach((link) => link.classList.toggle('active', link.dataset.doc === doc));
  }

  function showDoc(doc) {
    setActive(doc);

    if (!doc) {
      frame.classList.add('is-hidden');
      frame.removeAttribute('src');
      emptyState.classList.remove('is-hidden');
      return;
    }

    emptyState.classList.add('is-hidden');
    frame.classList.remove('is-hidden');
    frame.src = '/' + doc + '?t=' + Date.now();
  }

  function route() {
    showDoc(normalizeHash());
  }

  links.forEach((link) => {
    link.addEventListener('click', (event) => {
      event.preventDefault();
      const doc = link.dataset.doc;
      if (location.hash === '#' + doc) {
        showDoc(doc);
        return;
      }
      location.hash = doc;
    });
  });

  window.addEventListener('hashchange', route);
  route();
})();
</script>
</body>
</html>
