<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wiesel Docs Intern</title>
<link rel="stylesheet" href="../docs-theme.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar" aria-label="Dokumentnavigation">
    <a class="brand" href="./" data-overview>Wiesel Docs</a>

    <section class="section" aria-labelledby="public-docs">
      <h2 class="section-title" id="public-docs">Öffentlich</h2>
      <ul class="doc-list" id="public-doc-list"></ul>
    </section>

    <section class="section" aria-labelledby="internal-docs">
      <h2 class="section-title" id="internal-docs">Intern</h2>
      <ul class="doc-list" id="internal-doc-list"></ul>
    </section>
  </aside>

  <main class="content">
    <div class="empty-state" id="empty-state">
      <section class="doc-hub" aria-labelledby="internal-docs-title">
        <h1 id="internal-docs-title">Wähle eine interne Doc-Seite</h1>
        <p class="hub-copy">Die wichtigsten Betriebsansichten für Wiesel. Direkt hier im geschützten Bereich geladen.</p>

        <div class="doc-grid" id="internal-doc-grid" aria-label="Verfügbare interne Docs"></div>
      </section>
    </div>
    <iframe class="is-hidden" id="doc-frame" title="Wiesel internes Dokument"></iframe>
  </main>
</div>

<script src="/docs-config.js?v=docs-20260701-navfix1"></script>
<script>
(() => {
  const docsConfig = window.WIESEL_DOCS || { publicDocs: [], internalDocs: [] };
  const publicDocs = Array.isArray(docsConfig.publicDocs) ? docsConfig.publicDocs : [];
  const internalDocs = Array.isArray(docsConfig.internalDocs) ? docsConfig.internalDocs : [];

  const publicList = document.getElementById('public-doc-list');
  const internalList = document.getElementById('internal-doc-list');
  const internalGrid = document.getElementById('internal-doc-grid');
  const frame = document.getElementById('doc-frame');
  const emptyState = document.getElementById('empty-state');
  const overviewLinks = Array.from(document.querySelectorAll('[data-overview]'));

  function escapeHtml(value) {
    return String(value || '').replace(/[&<>'"]/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      "'": '&#39;',
      '"': '&quot;',
    }[char]));
  }

  function normalizePath(value) {
    return String(value || '').replace(/^\/+/, '');
  }

  function renderPublicDocs() {
    publicList.innerHTML = publicDocs.map((doc) => {
      const path = normalizePath(doc.path);
      return `<li><a class="doc-link" href="/#${escapeHtml(path)}">${escapeHtml(doc.title)}</a></li>`;
    }).join('');
  }

  function renderInternalDocs() {
    internalList.innerHTML = internalDocs.map((doc) => {
      const path = normalizePath(doc.path);
      return `<li><a class="doc-link" href="${escapeHtml(path)}" data-doc="${escapeHtml(path)}">${escapeHtml(doc.title)}</a></li>`;
    }).join('');

    internalGrid.innerHTML = internalDocs.map((doc) => {
      const path = normalizePath(doc.path);
      return `
        <a class="doc-card" href="${escapeHtml(path)}" data-doc="${escapeHtml(path)}">
          <span class="card-kicker">${escapeHtml(doc.kicker || 'Intern')}</span>
          <div>
            <h2>${escapeHtml(doc.title)}</h2>
            <p>${escapeHtml(doc.description || '')}</p>
          </div>
          <span class="card-foot"><span>${escapeHtml(doc.foot || 'Öffnen')}</span><span class="card-arrow">→</span></span>
        </a>
      `;
    }).join('');
  }

  renderPublicDocs();
  renderInternalDocs();

  const links = Array.from(document.querySelectorAll('[data-doc]'));
  const docs = new Set(links.map((link) => link.dataset.doc));

  function normalizeHash() {
    const raw = normalizePath(decodeURIComponent(location.hash.replace(/^#/, '')));
    return docs.has(raw) ? raw : '';
  }

  function setActive(doc) {
    links.forEach((link) => link.classList.toggle('active', link.dataset.doc === doc));
    overviewLinks.forEach((link) => link.classList.toggle('active', !doc));
  }

  function showDoc(doc) {
    setActive(doc);

    if (!doc) {
      frame.classList.add('is-hidden');
      frame.removeAttribute('src');
      emptyState.classList.remove('is-hidden');
      return;
    }

    emptyState.classList.add('is-hidden');
    frame.classList.remove('is-hidden');
    frame.src = `${doc}?t=${Date.now()}`;
  }

  function route() {
    const raw = normalizePath(decodeURIComponent(location.hash.replace(/^#/, '')));
    if (raw.startsWith('public/')) {
      window.location.href = '/#' + raw;
      return;
    }
    showDoc(normalizeHash());
  }

  links.forEach((link) => {
    link.addEventListener('click', (event) => {
      event.preventDefault();
      const doc = link.dataset.doc;
      if (normalizeHash() === doc) {
        history.pushState(null, '', location.pathname + location.search);
        showDoc('');
        return;
      }
      location.hash = doc;
    });
  });

  overviewLinks.forEach((link) => {
    link.addEventListener('click', (event) => {
      event.preventDefault();
      if (location.hash) {
        history.pushState(null, '', location.pathname + location.search);
      }
      showDoc('');
    });
  });

  window.addEventListener('hashchange', route);
  route();
})();
</script>
</body>
</html>
