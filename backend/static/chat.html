<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #ffffff;
      --bg2:     #f5f7fa;
      --bg3:     #eef0f5;
      --border:  #dde1ea;
      --orange:  #D85A30;
      --orange2: #c04e28;
      --orange3: #8b3a1a;
      --navy:    #1a2856;
      --navy2:   #253570;
      --text:    #1a1f2e;
      --tdim:    #6b7280;
      --font:    'Nunito', 'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #no-session {
      display: none;
      background: #fff8f0;
      border-bottom: 1px solid #fcd9b0;
      color: #92400e;
      font-size: 12px;
      padding: 8px 16px;
      flex-shrink: 0;
    }

    /* HEADER */
    .hbar {
      background: var(--navy);
      padding: 10px 14px 9px 20px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 2px solid var(--orange);
      flex-shrink: 0; position: relative;
    }
    .hav { width:36px; height:36px; flex-shrink:0; background:transparent; border:none; }
    .hav img { width:100%; height:100%; object-fit:cover; object-position:center top; }
    .hname { font-size:.9rem; font-weight:900; color:#ffffff; }
    .hname em { font-style:normal; color:#f5c4b3; }
    .hsub { font-size:.65rem; color:rgba(255,255,255,.5); }
    .hbadge { margin-left:auto; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); color:rgba(255,255,255,.8); font-size:.58rem; font-weight:800; padding:2px 8px; border-radius:7px; letter-spacing:.05em; text-transform:uppercase; }
    .chat-flag-wrap { position:relative; flex-shrink:0; }
    .chat-flag-btn { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.26); color:#fecaca; border-radius:9px; width:30px; height:30px; cursor:pointer; font-size:15px; }
    .chat-flag-btn:hover, .chat-flag-btn.flagged { background:#fee2e2; border-color:#fecaca; color:#dc2626; }
    .chat-flag-menu { display:none; position:absolute; right:0; top:36px; z-index:30; background:#fff; border:1px solid var(--border); border-radius:12px; width:260px; padding:8px; box-shadow:0 8px 24px rgba(0,0,0,.18); }
    .chat-flag-wrap.open .chat-flag-menu { display:block; }
    #ctx-label { font-size:11px; color:rgba(255,255,255,.4); margin-left:6px; }

    /* QUICK CHIPS */
    .kbar { background:var(--bg2); padding:8px 13px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .klabel { font-size:.57rem; color:var(--tdim); font-weight:800; letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px; }
    .kchips { display:flex; gap:6px; flex-wrap:wrap; }
    .kchip { background:#fff; border:1px solid var(--border); color:var(--navy); font-size:.67rem; font-weight:700; padding:4px 10px; border-radius:9px; cursor:pointer; transition:all .15s; font-family:var(--font); }
    .kchip:hover { background:var(--navy); color:#fff; border-color:var(--navy); transform:translateY(-1px); }

    /* MESSAGES */
    #messages {
      flex:1; overflow-y:auto; padding:14px;
      display:flex; flex-direction:column; gap:10px;
      scroll-behavior:smooth;
      background:var(--bg);
      position:relative;
    }
    #messages::-webkit-scrollbar { width:4px; }
    #messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    #drop-overlay {
      position:absolute;
      inset:18px;
      z-index:50;
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:8px;
      border:1.5px dashed rgba(37,99,235,.45);
      border-radius:16px;
      background:rgba(37,99,235,.055);
      color:#1d4ed8;
      pointer-events:none;
      text-align:center;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.55);
      backdrop-filter:blur(2px);
    }
    #messages.drag-over #drop-overlay { display:flex; }
    .drop-icon { width:42px; height:42px; border-radius:999px; background:rgba(37,99,235,.9); color:#fff; display:flex; align-items:center; justify-content:center; font-size:21px; box-shadow:0 8px 18px rgba(37,99,235,.16); }
    .drop-title { font-size:15px; font-weight:850; color:#1e3a8a; }
    .drop-subtitle { font-size:12px; font-weight:750; color:#2563eb; }

    .msg-row { display:flex; gap:10px; align-items:flex-end; animation:fadeIn .18s ease; }
    .msg-row.user { flex-direction:row-reverse; }
    .msg-row.error { justify-content:center; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1} }

    .msg-avatar {
      width: 52px; height: 52px;
      flex-shrink: 0;
      position: relative;
      background: transparent;
      border-radius: 0;
      padding: 0;
      border: none;
    }
    .msg-avatar img {
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.12));
    }

    .av-idle     { animation: avbob 3s ease-in-out infinite; }
    .av-think    { animation: avtilt 0.8s ease-in-out infinite; }
    .av-found    { animation: avcheer .6s ease-in-out 1 forwards; }
    .av-talk     { animation: avbob 3s ease-in-out infinite; }
    .av-dig      { animation: avdig 0.25s ease-in-out infinite; }
    .av-confused { animation: avconfused 1.4s ease-in-out infinite; }

    @keyframes avbob      { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-5px) rotate(1deg)} }
    @keyframes avtilt     { 0%,100%{transform:rotate(-8deg) translateY(2px)} 50%{transform:rotate(5deg) translateY(-2px)} }
    @keyframes avcheer    { 0%{transform:scale(1) translateY(0) rotate(0)} 35%{transform:scale(1.2) translateY(-10px) rotate(-5deg)} 65%{transform:scale(1.15) translateY(-8px) rotate(4deg)} 100%{transform:scale(1) translateY(0) rotate(0)} }
    @keyframes avdig      { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(4px) rotate(4deg)} }
    @keyframes avconfused { 0%,100%{transform:rotate(-6deg) translateY(0)} 25%{transform:rotate(6deg) translateY(-3px)} 50%{transform:rotate(-4deg) translateY(2px)} 75%{transform:rotate(5deg) translateY(-1px)} }

    .msg-avatar.frozen { animation: none !important; transform: none !important; }

    .msg { max-width:min(64ch,85%); padding:11px 14px; border-radius:16px; font-size:14px; line-height:1.65; word-break:break-word; }

    .msg.bot {
      background:#fff; border:1px solid var(--border);
      color:var(--text); border-bottom-left-radius:4px;
      border-left:3px solid var(--orange);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .msg.bot p { margin:0 0 .5em; }
    .msg.bot p:last-child { margin-bottom:0; }
    .msg.bot ul,.msg.bot ol { padding-left:1.3em; margin:.3em 0 .5em; }
    .msg.bot li { margin:.2em 0; }
    .msg.bot strong { color:var(--orange2); font-weight:700; }
    .msg.bot a { color:var(--navy2); text-underline-offset:2px; }
    .msg.bot code { background:var(--bg3); padding:1px 5px; border-radius:4px; font-size:13px; }

    .msg.user { background:var(--orange); border:none; color:#fff; font-weight:700; white-space:pre-wrap; border-bottom-right-radius:4px; box-shadow:0 2px 8px rgba(216,90,48,.25); }
    .msg.error { background:#fff0f0; border:1px solid #fecaca; color:#b91c1c; max-width:min(64ch, calc(100% - 28px)); }
    .flag-help-title { color:#991b1b; font-size:12px; font-weight:900; margin:2px 4px 4px; }
    .flag-help-text { color:#6b7280; font-size:11px; line-height:1.35; margin:0 4px 8px; }
    .flag-option { display:block; width:100%; border:0; background:#fff; color:#991b1b; text-align:left; font-family:var(--font); font-weight:800; font-size:12px; padding:8px 10px; border-radius:8px; cursor:pointer; }
    .flag-option:hover { background:#fee2e2; }
    .flag-toast { position:fixed; right:16px; top:70px; z-index:60; width:min(360px, calc(100vw - 32px)); background:#fff7ed; border:1px solid #fdba74; border-left:5px solid var(--orange); border-radius:14px; box-shadow:0 10px 28px rgba(0,0,0,.18); padding:12px 14px; color:#7c2d12; display:none; }
    .flag-toast.show { display:block; animation:fadeIn .18s ease; }
    .flag-toast-title { font-weight:900; font-size:14px; margin-bottom:4px; }
    .flag-toast-text { font-size:12px; line-height:1.45; margin-bottom:10px; }
    .flag-toast-actions { display:flex; gap:8px; justify-content:flex-end; }
    .flag-toast-btn { border:0; border-radius:9px; padding:7px 10px; font-family:var(--font); font-size:12px; font-weight:900; cursor:pointer; }
    .flag-toast-btn.secondary { background:#ffedd5; color:#9a3412; }
    .flag-toast-btn.primary { background:var(--orange); color:#fff; }

    /* TYPING */
    .typing-row { display:flex; gap:10px; align-items:flex-end; animation:fadeIn .18s ease; }
    .typing-bub { background:#fff; border:1px solid var(--border); border-left:3px solid var(--orange); border-radius:16px; border-bottom-left-radius:4px; padding:12px 14px; display:flex; align-items:center; gap:8px; font-size:.72rem; color:var(--tdim); font-weight:700; font-style:italic; box-shadow:0 1px 3px rgba(0,0,0,.06); }
    .tdots { display:flex; gap:4px; }
    .tdots span { width:6px; height:6px; background:var(--orange); border-radius:50%; animation:dbounce 1s infinite; opacity:.4; }
    .tdots span:nth-child(2){animation-delay:.15s}
    .tdots span:nth-child(3){animation-delay:.3s}
    @keyframes dbounce { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-4px);opacity:1} }

    /* INPUT */
    #input-area { display:flex; gap:8px; padding:11px 14px; border-top:1px solid var(--border); background:var(--bg2); flex-shrink:0; }
    #query { flex:1; background:#fff; border:1px solid var(--border); border-radius:13px; color:var(--text); font-family:var(--font); font-size:14px; font-weight:600; padding:10px 14px; resize:none; outline:none; transition:border-color .15s; max-height:120px; overflow-y:auto; line-height:1.5; }
    #query:focus { border-color:var(--navy); }
    body.voice-recording #query { border:1.5px solid #2563eb; }
    #query::placeholder { color:var(--tdim); opacity:.5; }
    #send { background:var(--orange); border:none; border-radius:13px; color:#fff; font-size:17px; width:42px; height:42px; cursor:pointer; flex-shrink:0; transition:transform .15s,box-shadow .15s; display:flex; align-items:center; justify-content:center; align-self:flex-end; box-shadow:0 2px 8px rgba(216,90,48,.3); }
    #send:hover { transform:scale(1.07); box-shadow:0 4px 14px rgba(216,90,48,.45); }
    #send:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }

    #char-limit-hint { display:none; text-align:center; font-size:.65rem; color:#b91c1c; background:#fff0f0; padding:4px 14px; flex-shrink:0; }

    .fnote { text-align:center; font-size:.58rem; color:var(--tdim); opacity:.5; padding:4px 0 2px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; background:var(--bg2); flex-shrink:0; }

    #attach-btn {
      background:#eef4ff; border:1px solid #d6e3ff; cursor:pointer;
      color:#2563eb; font-size:20px;
      width:38px; height:38px; border-radius:999px;
      padding:0; align-self:flex-end;
      transition:transform .15s, box-shadow .15s, background .15s; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      box-shadow:none;
    }
    #attach-btn:hover,
    body.file-drag-active #attach-btn {
      background:#2563eb;
      border-color:#2563eb;
      color:#fff;
      transform:scale(1.04);
      box-shadow:0 4px 12px rgba(37,99,235,.22);
    }
    #attach-btn svg { width:20px; height:20px; display:block; }
    #file-input { display: none; }

    .img-preview-wrap {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      background: var(--bg3);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .img-preview-wrap img { height: 48px; width: 48px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
    .img-preview-label { font-size: .7rem; color: var(--tdim); flex: 1; }
    .img-remove-btn { background: none; border: none; cursor: pointer; color: var(--tdim); font-size: 16px; padding: 0 4px; }
    .img-remove-btn:hover { color: var(--orange); }
    .msg-img { max-width: 220px; border-radius: 10px; margin-bottom: 6px; border: 1px solid var(--border); display: block; }

    #mic-btn {
      position:relative;
      background:#eef4ff; border:1px solid #d6e3ff; cursor:pointer;
      color:#2563eb; font-size:20px;
      width:38px; height:38px; border-radius:999px;
      padding:0; align-self:flex-end;
      transition:transform .15s, box-shadow .15s, background .15s, border-color .15s, color .15s; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      box-shadow:none;
      overflow:visible;
    }
    #mic-btn:hover { transform:scale(1.04); box-shadow:0 4px 12px rgba(37,99,235,.18); }
    #mic-btn.recording { background:#2563eb; border-color:#2563eb; color:#fff; box-shadow:0 4px 12px rgba(37,99,235,.22); }
    #mic-btn.voice-pulse::before,
    #mic-btn.voice-pulse::after {
      content:""; position:absolute; inset:-7px; border:2px solid #2563eb; border-radius:999px;
      opacity:.42; animation:mic-ring .9s ease-out 1; pointer-events:none;
    }
    #mic-btn.voice-pulse::after { animation-delay:.16s; }
    #mic-btn.timeout { background:#eef4ff; border:1.5px solid #2563eb; color:#2563eb; }
    #mic-btn.timeout::before {
      content:""; position:absolute; inset:-5px; border:2px solid transparent; border-top-color:#2563eb;
      border-radius:999px; animation:mic-arc-spin .8s linear infinite; pointer-events:none;
    }
    @keyframes mic-ring { 0%{transform:scale(.88);opacity:.5} 100%{transform:scale(1.55);opacity:0} }
    @keyframes mic-arc-spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<div id="no-session"></div>

<div class="hbar">
  <div class="hav">
    <img id="header-wiesel-img" src="/static/wiesel_standing.png" alt="" onerror="this.onerror=null;this.src='/static/wiesel_standing.png'">
  </div>
  <div>
    <div class="hname" id="hname"></div>
    <div class="hsub" id="hsub"></div>
  </div>
  <div class="hbadge" id="hbadge"></div>
  <div id="chat-flag" class="chat-flag-wrap" style="display:none">
    <button id="chat-flag-btn" class="chat-flag-btn" type="button">🚩</button>
    <div class="chat-flag-menu">
      <div class="flag-help-title" id="flag-help-title"></div>
      <div class="flag-help-text" id="flag-help-text"></div>
      <button id="chat-flag-option" class="flag-option" type="button"></button>
    </div>
  </div>
  <span id="ctx-label"></span>
</div>

<div class="kbar">
  <div class="klabel" id="quick-label"></div>
  <div class="kchips">
    <div class="kchip" id="quick-exams"></div>
    <div class="kchip" id="quick-start"></div>
    <div class="kchip" id="quick-office"></div>
    <div class="kchip" id="quick-links"></div>
  </div>
</div>

<div id="messages">
  <div id="drop-overlay" aria-hidden="true">
    <div class="drop-icon">⇪</div>
    <div class="drop-title" id="drop-title"></div>
    <div class="drop-subtitle" id="drop-subtitle"></div>
  </div>
</div>

<div id="flag-toast" class="flag-toast" role="status" aria-live="polite">
  <div class="flag-toast-title" id="flag-toast-title"></div>
  <div class="flag-toast-text" id="flag-toast-text"></div>
  <div class="flag-toast-actions">
    <button id="flag-toast-close" class="flag-toast-btn secondary" type="button"></button>
    <button id="flag-toast-new" class="flag-toast-btn primary" type="button"></button>
  </div>
</div>

<input type="file" id="file-input" accept="image/jpeg,image/png,image/webp">
<div id="img-preview" style="display:none" class="img-preview-wrap">
  <img id="img-thumb" src="" alt="">
  <span class="img-preview-label" id="img-name"></span>
  <button class="img-remove-btn" id="img-remove-btn" onclick="removeImage()">✕</button>
</div>
<div id="input-area">
  <textarea id="query" rows="1" maxlength="2000"></textarea>
  <button id="attach-btn" onclick="document.getElementById('file-input').click()">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M16.5 6.5 8.1 14.9a3 3 0 0 0 4.2 4.2l8.1-8.1a5 5 0 0 0-7.1-7.1L5.2 12a7 7 0 0 0 9.9 9.9l7.2-7.2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button id="mic-btn">🎤</button>
  <button id="send" disabled>↑</button>
</div>
<div id="char-limit-hint"></div>
<div class="fnote" id="footer-note"></div>

<script src="/static/strings.js"></script>
<script>
  const params    = new URLSearchParams(location.search);
  const token     = params.get('token');
  const sessionId = params.get('session_id') || null;
  const isDebugSession = params.get('debug') === '1' || (sessionId || '').startsWith('debug_session_wiesel_');
  window._userName = decodeURIComponent(params.get('user') || '');
  if (!token && params.get('mock') !== '1') {
    document.getElementById('no-session').style.display = 'block';
  }

  const messagesEl = document.getElementById('messages');
  const queryEl    = document.getElementById('query');
  const sendBtn    = document.getElementById('send');
  const MAX_IMAGE_BYTES = 3 * 1024 * 1024;
  const MAX_IMAGE_DIMENSION = 1600;
  const MAX_QUERY_CHARS = 2000;
  const ALLOWED_IMAGE_TYPES = ['image/jpeg', 'image/png', 'image/webp'];
  const LANG = (navigator.language || 'de').toLowerCase().startsWith('de') ? 'de' : 'en';
  document.documentElement.lang = LANG;

  const T = window.STRINGS[LANG];

  function setText(id, text) { const el = document.getElementById(id); if (el) el.textContent = text; }
  function setTitle(id, text) { const el = document.getElementById(id); if (el) { el.title = text; el.setAttribute('aria-label', text); } }

  function applyTranslations() {
    setText('no-session', T.noSession);
    document.title = T.pageTitle;
    document.getElementById('header-wiesel-img').alt = T.wieselAlt;
    document.getElementById('hname').innerHTML = T.hname;
    setText('hbadge', T.hbadge);
    setText('hsub', T.hsub);
    setTitle('chat-flag-btn', T.flagBtn);
    setText('flag-help-title', T.flagMenuTitle);
    setText('flag-help-text', T.flagMenuText);
    setText('chat-flag-option', T.flagOption);
    setText('quick-label', T.quickLabel);
    setText('quick-exams', T.quickExamsLabel);
    setText('quick-start', T.quickStartLabel);
    setText('quick-office', T.quickOfficeLabel);
    setText('quick-links', T.quickLinksLabel);
    setText('drop-title', T.dropTitle);
    setText('drop-subtitle', T.dropSubtitle);
    setText('flag-toast-title', T.flagToastTitle);
    setText('flag-toast-text', T.flagToastText);
    setText('flag-toast-close', T.flagToastClose);
    setText('flag-toast-new', T.flagToastNew);
    document.getElementById('img-thumb').alt = T.previewAlt;
    setTitle('img-remove-btn', T.removeImage);
    queryEl.placeholder = T.queryPlaceholder;
    setTitle('attach-btn', T.attachImage);
    setTitle('mic-btn', T.voiceInput);
    setTitle('send', T.send);
    setText('footer-note', T.footer);
    document.getElementById('quick-exams').addEventListener('click', () => quickSend(T.quickExamsPrompt));
    document.getElementById('quick-start').addEventListener('click', () => quickSend(T.quickStartPrompt));
    document.getElementById('quick-office').addEventListener('click', () => quickSend(T.quickOfficePrompt));
    document.getElementById('quick-links').addEventListener('click', () => quickSend(T.quickLinksPrompt));
  }
  applyTranslations();

  if (sessionId) {
    fetch(`/api/session/${sessionId}`)
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data?.course_name) document.getElementById('ctx-label').textContent = data.course_name;
        if (data?.user_name && data.user_name !== 'Debug Student' && data.user_name !== 'Eval Student') {
          window._userName = data.user_name;
        }
      })
      .catch(() => {});
  }

  const WIESEL_IMGS = {
    idle:     '/static/wiesel_standing.png',
    think:    '/static/wiesel_thinking.png',
    found:    '/static/wiesel_happy.png',
    dig:      '/static/wiesel_readingMHD.png',
    confused: '/static/wiesel_confused.png',
    talk:     '/static/wiesel_happy.png',
  };
  const DIG_VARIANTS = ['/static/wiesel_readingMHD.png'];
  const WIESEL_FALLBACK = '/static/wiesel_standing.png';

  function makeWieselSVG(state) {
    const wrap = document.createElement('div');
    wrap.className = `msg-avatar av-${state}`;
    let src = state === 'dig' ? DIG_VARIANTS[0] : (WIESEL_IMGS[state] || WIESEL_FALLBACK);
    wrap.innerHTML = `<img src="${src}" alt="${T.wieselAlt}" onerror="this.onerror=null;this.src='/static/wiesel_standing.png'">`;
    return wrap;
  }

  function detectAvatarState(text) {
    const t = text.toLowerCase();
    const reUncertain = /keine ahnung|was ist das|was meinst du|sag mir mehr|kann ich dir helfen|kannst du.*genauer|mehr kontext|verstehe.*nicht|nicht verstanden|ich weiß.*nicht|weiss.*nicht|weiß ich nicht|nicht sicher|bin mir.*nicht sicher|nicht gefunden|leider keine|keine information|kein hinweis|unklar|unbekannt|verirrt|vertippt/i;
    const reGreeting = /hey|hallo|hi|servus|moin|gutes timing/i;
    const reExplain = /das bedeutet|kurz gesagt|wichtig ist|du musst|schritt|erstens|zweitens|anmeldung|prüfung|prüfungen|frist|fristen|öffnungszeiten|adresse/i;
    const rePositive = /gern|klar|passt|gefunden|genau|super|hier|klingt/i;
    if (reUncertain.test(t)) return 'confused';
    if (reGreeting.test(t)) return 'talk';
    if (reExplain.test(t)) return 'think';
    if (rePositive.test(t)) return 'found';
    return ['talk','think','found'][Math.floor(Math.random()*3)];
  }

  const typingPhrases = T.typingPhrases;

  function setupChatFlagControl() {
    if (!sessionId) return;
    const wrap = document.getElementById('chat-flag');
    const btn = document.getElementById('chat-flag-btn');
    const opt = document.getElementById('chat-flag-option');
    wrap.style.display = 'block';
    btn.addEventListener('click', (e) => { e.stopPropagation(); wrap.classList.toggle('open'); });
    opt.addEventListener('click', async (e) => {
      e.stopPropagation();
      wrap.classList.remove('open');
      btn.disabled = true;
      try {
        const res = await fetch('/api/chat/flag', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({session_id: sessionId, tag: 'auffaelligkeit'})
        });
        if (!res.ok) throw new Error('flag failed');
        btn.classList.add('flagged');
        btn.title = T.flagBtnMarked;
        showFlagToast();
      } catch {
        btn.disabled = false;
        btn.title = T.flagBtnFailed;
      }
    });
  }

  setupChatFlagControl();
  setupFlagToast();
  document.addEventListener('click', () => document.querySelectorAll('.chat-flag-wrap.open').forEach(w => w.classList.remove('open')));

  function setupFlagToast() {
    const toast = document.getElementById('flag-toast');
    const closeBtn = document.getElementById('flag-toast-close');
    const newBtn = document.getElementById('flag-toast-new');
    if (!toast || !closeBtn || !newBtn) return;
    closeBtn.addEventListener('click', () => toast.classList.remove('show'));
    newBtn.addEventListener('click', () => {
    window.location.href = isDebugSession ? '/chat?debug=true' : '/chat' + location.search;
    });
  }

  function showFlagToast() {
    const toast = document.getElementById('flag-toast');
    if (toast) toast.classList.add('show');
  }

  function addMessage(role, text, avatarState = 'talk') {
    const row = document.createElement('div');
    row.className = 'msg-row ' + (role === 'user' ? 'user' : role === 'bot' ? 'bot' : 'error');
    const bubble = document.createElement('div');
    bubble.className = 'msg ' + role;
    if (role === 'user' && window._pendingImgSrc) {
      const img = document.createElement('img');
      img.src = window._pendingImgSrc;
      img.className = 'msg-img';
      bubble.appendChild(img);
      window._pendingImgSrc = null;
    }
    if (role === 'bot') {
      bubble.innerHTML = marked.parse(text);
      bubble.querySelectorAll("a").forEach(a => { a.target = "_blank"; a.rel = "noopener noreferrer"; });
      document.querySelectorAll('#messages .msg-avatar:not(.user-av)').forEach(av => { av.className = 'msg-avatar frozen'; });
      row.appendChild(makeWieselSVG(avatarState));
    } else if (role === 'user') {
      if (text) { const span = document.createElement('span'); span.textContent = text; bubble.appendChild(span); }
    } else {
      bubble.textContent = text;
    }
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing-row';
    const phrase = typingPhrases[Math.floor(Math.random() * typingPhrases.length)];
    row.appendChild(makeWieselSVG('dig'));
    const bub = document.createElement('div');
    bub.className = 'typing-bub';
    bub.innerHTML = '<div class="tdots"><span></span><span></span><span></span></div><span id="typing-txt">' + phrase + '</span>';
    row.appendChild(bub);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function removeTyping() { const t = document.getElementById('typing-row'); if (t) t.remove(); }

  let pendingImageBase64 = null;
  let pendingImageType = null;

  function loadGreeting() {
    const greeting = T.greeting;
    addMessage('bot', greeting, detectAvatarState(greeting));
    sendBtn.disabled = queryEl.value.trim().length === 0 && !pendingImageBase64;
  }

  loadGreeting();

  queryEl.addEventListener('input', () => {
    queryEl.style.height = 'auto';
    queryEl.style.height = queryEl.scrollHeight + 'px';
    sendBtn.disabled = queryEl.value.trim().length === 0 && !pendingImageBase64;
    const hint = document.getElementById('char-limit-hint');
    if (hint) {
      const atLimit = queryEl.value.length >= MAX_QUERY_CHARS;
      hint.style.display = atLimit ? 'block' : 'none';
      if (atLimit) hint.textContent = T.tooLong;
    }
  });

  queryEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
  sendBtn.addEventListener('click', send);

  async function send() {
    const text = queryEl.value.trim();
    if (!text && !pendingImageBase64) return;
    if (text.length > MAX_QUERY_CHARS) {
      addMessage('error', '⚠️ ' + T.tooLong);
      return;
    }
    const sid = sessionId || 'anon-' + Math.random().toString(36).slice(2);
    if (pendingImageBase64) window._pendingImgSrc = 'data:' + pendingImageType + ';base64,' + pendingImageBase64;
    addMessage('user', text);
    queryEl.value = ''; queryEl.style.height = 'auto'; sendBtn.disabled = true;
    const hint = document.getElementById('char-limit-hint');
    if (hint) hint.style.display = 'none';
    addTyping();
    const readTimer = setTimeout(() => { const txt = document.getElementById('typing-txt'); if (txt) txt.textContent = T.readImage; }, 1400);
    try {
      const body = {query: text || T.defaultImageQuestion, session_id: sid};
      if (pendingImageBase64) { body.image_base64 = pendingImageBase64; body.image_type = pendingImageType; }
      if (token) body.token = token;
      const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
      clearTimeout(readTimer); removeTyping(); removeImage();
      if (!res.ok) { addMessage('error', '⚠️ ' + T.genericError); return; }
      const data = await res.json();
      addMessage('bot', data.response, detectAvatarState(data.response));
    } catch { clearTimeout(readTimer); removeTyping(); addMessage('error', '⚠️ ' + T.genericError); }
    sendBtn.disabled = false;
  }

  function blobToDataUrl(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  async function prepareImage(file) {
    if (!ALLOWED_IMAGE_TYPES.includes(file.type)) {
      throw new Error(T.imageTypeError);
    }
    if (file.size > MAX_IMAGE_BYTES) {
      throw new Error(T.imageSizeError);
    }
    let bitmap;
    try {
      bitmap = await createImageBitmap(file);
    } catch {
      throw new Error(T.imageReadError);
    }
    const scale = Math.min(1, MAX_IMAGE_DIMENSION / bitmap.width, MAX_IMAGE_DIMENSION / bitmap.height);
    const width = Math.max(1, Math.round(bitmap.width * scale));
    const height = Math.max(1, Math.round(bitmap.height * scale));
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    canvas.getContext('2d').drawImage(bitmap, 0, 0, width, height);
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
    if (!blob) throw new Error(T.imageProcessError);
    if (blob.size > MAX_IMAGE_BYTES) {
      throw new Error(T.imageCompressedTooLarge);
    }
    return await blobToDataUrl(blob);
  }

  async function handleImageFile(file) {
    try {
      const dataUrl = await prepareImage(file);
      pendingImageBase64 = dataUrl.split(',')[1];
      pendingImageType = 'image/jpeg';
      document.getElementById('img-thumb').src = dataUrl;
      document.getElementById('img-name').textContent = file.name;
      document.getElementById('img-preview').style.display = 'flex';
      sendBtn.disabled = false;
    } catch (err) {
      removeImage();
      addMessage('error', '⚠️ ' + (err.message || T.imageProcessError));
    }
  }

  document.getElementById('file-input').addEventListener('change', async function() {
    const file = this.files[0];
    this.value = '';
    if (!file) return;
    await handleImageFile(file);
  });

  function isFileDrag(event) {
    return Array.from(event.dataTransfer?.types || []).includes('Files');
  }

  messagesEl.addEventListener('dragover', (event) => {
    if (!isFileDrag(event)) return;
    event.preventDefault();
    messagesEl.classList.add('drag-over');
    document.body.classList.add('file-drag-active');
  });

  messagesEl.addEventListener('dragleave', (event) => {
    if (!messagesEl.contains(event.relatedTarget)) {
      messagesEl.classList.remove('drag-over');
      document.body.classList.remove('file-drag-active');
    }
  });

  messagesEl.addEventListener('drop', async (event) => {
    if (!isFileDrag(event)) return;
    event.preventDefault();
    messagesEl.classList.remove('drag-over');
    document.body.classList.remove('file-drag-active');
    const file = event.dataTransfer.files?.[0];
    if (!file) return;
    await handleImageFile(file);
  });

  function removeImage() {
    pendingImageBase64 = null; pendingImageType = null;
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('img-thumb').src = '';
    sendBtn.disabled = queryEl.value.trim().length === 0 && !pendingImageBase64;
  }

  let recognition = null, isRecording = false, isVoiceStarting = false, silenceTimer = null, timeoutUiTimer = null, voiceStartGuardTimer = null, voicePulseTimer = null, voiceTimedOut = false;
  let voiceBaseText = '', voiceFinalTranscript = '', voiceInterimTranscript = '';
  const micBtn = document.getElementById('mic-btn');
  const VOICE_SILENCE_TIMEOUT_MS = 60000;
  const VOICE_NO_INPUT_TIMEOUT_MS = 10000;
  const VOICE_START_GUARD_MS = 3500;

  function showVoiceError(message) {
    addMessage('error', '⚠️ ' + message);
  }

  function setVoiceRecordingUi(active) {
    micBtn.disabled = false;
    micBtn.classList.toggle('recording', active);
    document.body.classList.toggle('voice-recording', active);
    if (!active) {
      clearTimeout(voicePulseTimer);
      voicePulseTimer = null;
      micBtn.classList.remove('voice-pulse');
    }
  }

  function triggerVoicePulse() {
    if (!isRecording) return;
    clearTimeout(voicePulseTimer);
    micBtn.classList.remove('voice-pulse');
    void micBtn.offsetWidth;
    micBtn.classList.add('voice-pulse');
    voicePulseTimer = setTimeout(() => {
      micBtn.classList.remove('voice-pulse');
      voicePulseTimer = null;
    }, 1100);
  }

  function resetVoiceInput({ commit = true } = {}) {
    if (commit) commitVoiceTranscript();
    isRecording = false;
    isVoiceStarting = false;
    clearTimeout(silenceTimer);
    clearTimeout(voiceStartGuardTimer);
    silenceTimer = null;
    voiceStartGuardTimer = null;
    voiceBaseText = queryEl.value;
    voiceFinalTranscript = '';
    voiceInterimTranscript = '';
    setVoiceRecordingUi(false);
    if (!voiceTimedOut) micBtn.classList.remove('timeout');
  }

  function showVoiceTimeout() {
    voiceTimedOut = true;
    isRecording = false;
    isVoiceStarting = false;
    commitVoiceTranscript();
    clearTimeout(silenceTimer);
    clearTimeout(timeoutUiTimer);
    clearTimeout(voiceStartGuardTimer);
    silenceTimer = null;
    voiceStartGuardTimer = null;
    voiceFinalTranscript = '';
    voiceInterimTranscript = '';
    setVoiceRecordingUi(false);
    micBtn.classList.add('timeout');
    try { recognition.stop(); } catch {}
    timeoutUiTimer = setTimeout(() => {
      voiceTimedOut = false;
      micBtn.classList.remove('timeout');
      micBtn.disabled = false;
    }, 1400);
  }

  function resetVoiceSilenceTimer(timeoutMs = VOICE_SILENCE_TIMEOUT_MS) {
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(showVoiceTimeout, timeoutMs);
  }

  function voiceErrorMessage(errorCode) {
    return T.voiceErrors[errorCode] || T.voiceErrors.default;
  }

  function composeVoiceText(baseText, spokenText) {
    const base = (baseText || '').trim();
    const spoken = (spokenText || '').trim();
    if (!spoken) return base;
    if (!base) return spoken;
    return `${base} ${spoken}`;
  }

  function commitVoiceTranscript() {
    const spoken = `${voiceFinalTranscript} ${voiceInterimTranscript}`.trim();
    if (!spoken) return;
    queryEl.value = composeVoiceText(voiceBaseText, spoken).slice(0, MAX_QUERY_CHARS);
    queryEl.dispatchEvent(new Event('input'));
  }

  if (!window.isSecureContext) {
    micBtn.title = T.voiceSecureTitle;
    micBtn.addEventListener('click', () => showVoiceError(T.voiceSecureError));
  } else if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'de-DE';
    recognition.interimResults = true;
    recognition.continuous = true;
    recognition.onstart = () => {
      voiceTimedOut = false;
      voiceBaseText = queryEl.value;
      voiceFinalTranscript = '';
      voiceInterimTranscript = '';
      clearTimeout(timeoutUiTimer);
      clearTimeout(voiceStartGuardTimer);
      isVoiceStarting = false;
      isRecording = true;
      micBtn.classList.remove('timeout');
      setVoiceRecordingUi(true);
      resetVoiceSilenceTimer(VOICE_NO_INPUT_TIMEOUT_MS);
    };
    recognition.onresult = (e) => {
      voiceInterimTranscript = '';
      for (let i = e.resultIndex; i < e.results.length; i += 1) {
        const transcript = e.results[i][0].transcript;
        if (e.results[i].isFinal) voiceFinalTranscript += transcript + ' ';
        else voiceInterimTranscript += transcript;
      }
      resetVoiceSilenceTimer();
      triggerVoicePulse();
    };
    recognition.onend = () => resetVoiceInput({ commit: true });
    recognition.onerror = (event) => {
      resetVoiceInput({ commit: false });
      if (event.error !== 'aborted') showVoiceError(voiceErrorMessage(event.error));
    };
    micBtn.addEventListener('click', () => {
      if (isRecording || isVoiceStarting) {
        try { recognition.stop(); } catch {}
        resetVoiceInput({ commit: isRecording });
        return;
      }
      try {
        voiceTimedOut = false;
        isVoiceStarting = true;
        voiceBaseText = queryEl.value;
        voiceFinalTranscript = '';
        voiceInterimTranscript = '';
        clearTimeout(timeoutUiTimer);
        clearTimeout(voiceStartGuardTimer);
        micBtn.classList.remove('timeout');
        setVoiceRecordingUi(true);
        recognition.lang = document.documentElement.lang === 'en' ? 'en-US' : 'de-DE';
        recognition.start();
        voiceStartGuardTimer = setTimeout(() => {
          if (!isRecording && isVoiceStarting) {
            resetVoiceInput({ commit: false });
            showVoiceError(T.voiceStartGuard);
          }
        }, VOICE_START_GUARD_MS);
      } catch {
        resetVoiceInput({ commit: false });
        showVoiceError(T.voiceStartError);
      }
    });
  } else { micBtn.style.display = 'none'; }

  function quickSend(text) { queryEl.value = text; queryEl.dispatchEvent(new Event('input')); send(); }
</script>
