<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiesel – Dein Studienbegleiter</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #111827;
      --navy-mid:   #1a2236;
      --navy-light: #243049;
      --border:     #2e3a52;
      --red:        #c8293a;
      --red-dim:    #8a1a26;
      --text:       #e8eaf0;
      --text-dim:   #8b96b0;
      --radius:     14px;
      --font:       'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: var(--font);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--navy-mid);
      flex-shrink: 0;
    }
    .header-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--navy-light);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }
    .header-avatar .fallback { font-size: 18px; line-height: 1; }
    header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.01em;
    }
    header h1 em {
      font-style: normal;
      color: var(--red);
    }
    header .badge {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
      margin-left: auto;
    }
    #ctx-label { font-size: 12px; color: var(--text-dim); }

    /* ── Welcome Screen ─────────────────────────────────────────────────────── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px 24px;
      text-align: center;
      animation: fadeIn .3s ease;
    }
    #welcome.hidden { display: none; }

    .mascot-wrap {
      position: relative;
      width: 140px;
      height: 140px;
    }
    .mascot-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 8px 24px rgba(200, 41, 58, .25));
    }
    .mascot-wrap .fallback-big {
      font-size: 80px;
      line-height: 140px;
    }

    #welcome h2 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.02em;
    }
    #welcome h2 em {
      font-style: normal;
      color: var(--red);
    }
    #welcome p {
      font-size: 14px;
      color: var(--text-dim);
      max-width: 30ch;
      line-height: 1.6;
    }

    /* ── Messages ───────────────────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    #messages:empty + #welcome { display: flex; }

    .msg-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      animation: fadeIn .18s ease;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      margin-top: 2px;
      background: var(--navy-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }
    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }
    .msg-avatar.user-av {
      background: var(--navy-light);
      border: 1px solid var(--border);
    }

    .msg {
      max-width: min(68ch, 88%);
      padding: 11px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }

    /* Bot message styling */
    .msg.bot {
      background: var(--navy-mid);
      border: 1px solid var(--border);
      color: var(--text);
      border-top-left-radius: 4px;
    }
    .msg.bot p  { margin: 0 0 .55em; }
    .msg.bot p:last-child { margin-bottom: 0; }
    .msg.bot ul, .msg.bot ol { padding-left: 1.3em; margin: .3em 0 .5em; }
    .msg.bot li { margin: .2em 0; }
    .msg.bot strong { color: #c8d8ff; font-weight: 600; }
    .msg.bot h1, .msg.bot h2, .msg.bot h3 {
      font-size: 14px;
      font-weight: 600;
      color: #c8d8ff;
      margin: .6em 0 .3em;
    }
    .msg.bot code { background: #1a2236; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
    .msg.bot pre  { background: #1a2236; padding: 10px; border-radius: 8px; overflow-x: auto; margin: .5em 0; }
    .msg.bot a    { color: #7aacff; text-underline-offset: 2px; }
    .msg.bot table { border-collapse: collapse; width: 100%; margin: .5em 0; font-size: 13px; }
    .msg.bot td, .msg.bot th { border: 1px solid var(--border); padding: 5px 8px; }
    .msg.bot th { background: var(--navy-light); }

    /* User message */
    .msg.user {
      background: var(--navy-light);
      border: 1px solid var(--border);
      color: var(--text);
      white-space: pre-wrap;
      border-top-right-radius: 4px;
    }

    .msg.error {
      background: #2a1315;
      border: 1px solid #5a2020;
      color: #ff8080;
    }

    /* Typing */
    .typing-row { display: flex; gap: 8px; align-items: center; animation: fadeIn .18s ease; }
    .typing {
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-top-left-radius: 4px;
      padding: 14px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .typing span {
      width: 6px; height: 6px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    /* ── Input area ─────────────────────────────────────────────────────────── */
    #input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--navy-mid);
      flex-shrink: 0;
    }

    #query {
      flex: 1;
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      transition: border-color .15s;
      max-height: 140px;
      overflow-y: auto;
      line-height: 1.5;
    }
    #query:focus { border-color: var(--red); }
    #query::placeholder { color: var(--text-dim); }

    #send {
      background: var(--red);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 17px;
      width: 42px; height: 42px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s, opacity .15s;
      display: flex; align-items: center; justify-content: center;
      align-self: flex-end;
    }
    #send:hover { background: #e03347; }
    #send:disabled { opacity: .35; cursor: not-allowed; }

    /* ── No-session banner ──────────────────────────────────────────────────── */
    #no-session {
      display: none;
      background: #1e1a10;
      border-bottom: 1px solid #4a3a10;
      color: #d4b060;
      font-size: 12px;
      padding: 8px 16px;
      flex-shrink: 0;
    }

    /* ── Scrollbar ──────────────────────────────────────────────────────────── */
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<div id="no-session">
  ⚠️ Kein Session-Token. Dein Verlauf wird nicht gespeichert.
</div>

<header>
  <div class="header-avatar" id="header-av">
    <img src="/static/wiesel.jpg" alt="Wiesel" onerror="this.style.display='none';document.getElementById('header-av').innerHTML='<span class=\'fallback\'>🐾</span>'">
  </div>
  <h1><em>WiSo</em> Wiesel</h1>
  <span class="badge">FAU Erlangen-Nürnberg</span>
  <span id="ctx-label"></span>
</header>

<div id="messages"></div>

<div id="welcome" class="hidden">
  <div class="mascot-wrap">
    <img src="/static/wiesel.jpg" alt="Wiesel Maskottchen"
         onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div class="fallback-big" style="display:none">🦡</div>
  </div>
  <h2>Ich bin <em>Wiesel</em>.</h2>
  <p>Kenne das Labyrinth hier ganz gut. Campo, StudOn, Prüfungsamt — was brauchst du?</p>
</div>

<div id="input-area">
  <textarea id="query" placeholder="Wo hängst du gerade?" rows="1"></textarea>
  <button id="send" title="Senden" disabled>↑</button>
</div>

<script>
  const params    = new URLSearchParams(location.search);
  const token     = params.get('token');
  const sessionId = params.get('session_id') || null;
  const mockMode  = params.get('mock') === '1';

  if (!token && !mockMode) {
    document.getElementById('no-session').style.display = 'block';
  }

  const messagesEl = document.getElementById('messages');
  const welcomeEl  = document.getElementById('welcome');
  const queryEl    = document.getElementById('query');
  const sendBtn    = document.getElementById('send');
  const ctxLabel   = document.getElementById('ctx-label');

  // Show welcome screen initially
  welcomeEl.classList.remove('hidden');

  if (sessionId) {
    fetch(`/api/session/${sessionId}`)
      .then(r => r.ok ? r.json() : null)
      .then(data => { if (data?.course_name) ctxLabel.textContent = data.course_name; })
      .catch(() => {});
  }

  // ── Greeting ──────────────────────────────────────────────────────────────
  async function loadGreeting() {
    const typingRow = addTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query: '__greeting__',
          session_id: sessionId || 'anon-' + Math.random().toString(36).slice(2)
        })
      });
      typingRow.remove();
      if (res.ok) {
        const data = await res.json();
        welcomeEl.classList.add('hidden');
        addMessage('bot', data.response);
      }
    } catch {
      typingRow.remove();
      welcomeEl.classList.add('hidden');
      addMessage('bot', 'Hey – ich bin Wiesel. Was brauchst du?');
    }
    sendBtn.disabled = queryEl.value.trim().length === 0;
  }

  loadGreeting();

  // ── Input ──────────────────────────────────────────────────────────────────
  queryEl.addEventListener('input', () => {
    queryEl.style.height = 'auto';
    queryEl.style.height = queryEl.scrollHeight + 'px';
    sendBtn.disabled = queryEl.value.trim().length === 0;
  });

  queryEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', send);

  // ── Send ───────────────────────────────────────────────────────────────────
  async function send() {
    const text = queryEl.value.trim();
    if (!text) return;

    welcomeEl.classList.add('hidden');
    addMessage('user', text);
    queryEl.value = '';
    queryEl.style.height = 'auto';
    sendBtn.disabled = true;

    const typingRow = addTyping();

    try {
      const body = { query: text };
      if (token)     body.token      = token;
      if (sessionId) body.session_id = sessionId;
      if (!body.session_id) body.session_id = 'anon-' + Math.random().toString(36).slice(2);

      const res = await fetch('/api/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });

      typingRow.remove();

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        addMessage('error', '⚠️ ' + (err.detail || 'Unbekannter Fehler'));
        return;
      }

      const data = await res.json();
      addMessage('bot', data.response);

    } catch (err) {
      typingRow.remove();
      addMessage('error', '⚠️ Verbindung fehlgeschlagen.');
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function makeAvatar(role) {
    const av = document.createElement('div');
    av.className = 'msg-avatar' + (role === 'user' ? ' user-av' : '');
    if (role === 'bot') {
      av.innerHTML = `<img src="/static/wiesel.jpg" alt="" onerror="this.style.display='none';this.parentElement.textContent='🐾'">`;
    } else {
      av.textContent = '👤';
    }
    return av;
  }

  function addMessage(role, text) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + (role === 'user' ? 'user' : role === 'bot' ? 'bot' : 'error');

    const bubble = document.createElement('div');
    bubble.className = 'msg ' + role;

    if (role === 'bot') {
      bubble.innerHTML = marked.parse(text);
      row.appendChild(makeAvatar('bot'));
    } else if (role === 'user') {
      bubble.textContent = text;
      row.appendChild(makeAvatar('user'));
    } else {
      bubble.textContent = text;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return row;
    }

    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.appendChild(makeAvatar('bot'));
    const t = document.createElement('div');
    t.className = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(t);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return row;
  }
</script>
</body>
</html>
